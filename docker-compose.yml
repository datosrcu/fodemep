services:
  tablero-incidencias:
    build: .
    container_name: tablero_incidencias_app
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - PORT=5000
      - UPLOAD_FOLDER=/app/uploads
    restart: unless-stopped

volumes:
  uploads_data:
    name: tablero_incidencias_uploads
